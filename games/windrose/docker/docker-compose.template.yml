services:
  windrose-server:
    image: indifferentbroccoli/windrose-server-docker:latest
    container_name: ${CONTAINER_NAME}
    stop_grace_period: 30s
    ports:
      - "${GAME_PORT}:7777/tcp"
      - "${GAME_PORT}:7777/udp"
    volumes:
      - windrose_data:/home/steam/server-files
    restart: ${RESTART_POLICY}
    environment:
      - PUID=1000
      - PGID=1000
      - UPDATE_ON_START=${UPDATE_ON_START}
      - GENERATE_SETTINGS=true
      - INVITE_CODE=${INVITE_CODE}
      - SERVER_NAME=${SERVER_NAME}
      - SERVER_PASSWORD=${SERVER_PASSWORD}
      - MAX_PLAYERS=${MAX_PLAYERS}
      - USE_DIRECT_CONNECTION=true
      - SERVER_PORT=7777
      - USER_SELECTED_REGION=${USER_SELECTED_REGION}
      - P2P_PROXY_ADDRESS=127.0.0.1
    deploy:
      resources:
        limits:
          memory: ${MEMORY_LIMIT}

volumes:
  windrose_data:
    external: true
    name: ${VOLUME_NAME}
