name: PR Validation and Testing

on:
  pull_request:
    branches: [ main ]
    paths:
      - 'scripts/**'
      - 'environments/**'
      - 'systemd/**'
      - 'games/**'
      - '.github/workflows/**'

  workflow_dispatch:
    inputs:
      run_integration_tests:
        description: 'Run integration tests'
        required: false
        default: false
        type: boolean

jobs:
  validate-scripts:
    name: Validate Shell Scripts
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      
    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y shellcheck jq bc
        
    - name: Validate Shell Scripts Syntax
      run: |
        echo "Validating shell scripts..."
        find scripts/ -name "*.sh" -type f | while read -r script; do
          echo "Checking: $script"
          bash -n "$script"
        done
        
    - name: Run ShellCheck
      run: |
        echo "Running ShellCheck..."
        find scripts/ -name "*.sh" -type f | while read -r script; do
          echo "ShellCheck: $script"
          shellcheck "$script" || exit 1
        done
        
    - name: Validate Directory Structure
      run: |
        echo "Validating directory structure..."
        
        # Check required directories exist
        required_dirs=(
          "scripts/core"
          "scripts/shared" 
          "scripts/deployment"
          "environments"
          "systemd/templates"
          "games"
        )
        
        for dir in "${required_dirs[@]}"; do
          if [[ ! -d "$dir" ]]; then
            echo "ERROR: Required directory not found: $dir"
            exit 1
          fi
        done
        
        echo "Directory structure validation passed"

  validate-configurations:
    name: Validate Configuration Files
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      
    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y jq
        
    - name: Validate JSON Configuration Files
      run: |
        echo "Validating JSON configuration files..."
        
        # Find all JSON files and validate syntax
        find . -name "*.json" -type f | while read -r json_file; do
          echo "Validating: $json_file"
          jq empty "$json_file" || {
            echo "ERROR: Invalid JSON syntax in $json_file"
            exit 1
          }
        done
        
        echo "JSON validation passed"
        
    - name: Validate Registry Files Schema
      run: |
        echo "Validating registry file schemas..."
        
        # Validate global registry files
        find environments/ -name "global-registry.json" -type f | while read -r registry; do
          echo "Validating global registry: $registry"
          
          # Check required fields
          if ! jq -e '.supported_games' "$registry" > /dev/null; then
            echo "ERROR: Missing supported_games in $registry"
            exit 1
          fi
          
          if ! jq -e '.environments' "$registry" > /dev/null; then
            echo "ERROR: Missing environments in $registry"
            exit 1
          fi
        done
        
        # Validate game registry files  
        find environments/ -path "*/games/*/registry.json" -type f | while read -r registry; do
          echo "Validating game registry: $registry"
          
          # Check required fields
          if ! jq -e '.supported_contexts' "$registry" > /dev/null; then
            echo "ERROR: Missing supported_contexts in $registry"
            exit 1
          fi
          
          if ! jq -e '.game_config' "$registry" > /dev/null; then
            echo "ERROR: Missing game_config in $registry"
            exit 1
          fi
        done
        
        echo "Registry schema validation passed"

  validate-systemd-templates:
    name: Validate Systemd Templates
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      
    - name: Validate Systemd Service Templates
      run: |
        echo "Validating systemd service templates..."
        
        # Check template files exist
        if [[ ! -f "systemd/templates/game-server@.service.template" ]]; then
          echo "ERROR: Systemd service template not found"
          exit 1
        fi
        
        # Basic validation of service file format
        template_file="systemd/templates/game-server@.service.template"
        
        # Check required sections exist
        required_sections=("[Unit]" "[Service]" "[Install]")
        for section in "${required_sections[@]}"; do
          if ! grep -q "^${section}$" "$template_file"; then
            echo "ERROR: Missing section $section in $template_file"
            exit 1
          fi
        done
        
        # Check required Unit fields
        required_unit_fields=("Description" "After" "Requires")
        for field in "${required_unit_fields[@]}"; do
          if ! grep -q "^${field}=" "$template_file"; then
            echo "ERROR: Missing $field in [Unit] section"
            exit 1
          fi
        done
        
        # Check required Service fields
        required_service_fields=("ExecStart" "ExecStop" "User")
        for field in "${required_service_fields[@]}"; do
          if ! grep -q "^${field}=" "$template_file"; then
            echo "ERROR: Missing $field in [Service] section"
            exit 1
          fi
        done
        
        echo "Systemd template validation passed"

  test-script-functionality:
    name: Test Script Functionality
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      
    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y jq bc docker.io
        
    - name: Test Script Help/Usage
      run: |
        echo "Testing script help and usage..."
        
        # Test all main scripts can show help
        scripts_to_test=(
          "scripts/core/server-manager.sh"
          "scripts/deployment/deploy.sh"
          "scripts/deployment/health-check.sh"
          "scripts/deployment/rollback.sh"
          "systemd/generate-services.sh"
        )
        
        for script in "${scripts_to_test[@]}"; do
          if [[ -f "$script" ]]; then
            echo "Testing help for: $script"
            chmod +x "$script"
            "$script" --help || "$script" -h || {
              echo "ERROR: Script $script does not respond to help flags"
              exit 1
            }
          fi
        done
        
        echo "Script help/usage tests passed"
        
    - name: Test Dry Run Functionality
      run: |
        echo "Testing dry run functionality..."
        
        # Test dry run modes where available
        dry_run_scripts=(
          "scripts/deployment/deploy.sh"
          "scripts/deployment/rollback.sh"
          "systemd/generate-services.sh"
        )
        
        for script in "${dry_run_scripts[@]}"; do
          if [[ -f "$script" ]]; then
            echo "Testing dry run for: $script"
            chmod +x "$script"
            
            # This should fail gracefully with validation errors, not crash
            "$script" --dry-run --env nonexistent --game test --context test 2>&1 || true
          fi
        done
        
        echo "Dry run functionality tests passed"

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      
    - name: Scan for Hardcoded Secrets
      run: |
        echo "Scanning for potential security issues..."
        
        # Check for hardcoded passwords, tokens, keys
        security_patterns=(
          "password="
          "token="
          "secret="
          "key="
          "api_key="
          "private_key"
          "BEGIN.*PRIVATE.*KEY"
        )
        
        for pattern in "${security_patterns[@]}"; do
          echo "Checking for pattern: $pattern"
          if grep -ri "$pattern" scripts/ environments/ || true; then
            echo "WARNING: Found potential security pattern: $pattern"
            echo "Please review these files for hardcoded credentials"
          fi
        done
        
    - name: Check Script Permissions
      run: |
        echo "Checking script permissions..."
        
        # Ensure scripts are executable but not world-writable
        find scripts/ -name "*.sh" -type f | while read -r script; do
          perms=$(stat -c "%a" "$script")
          if [[ "$perms" =~ [0-9][0-9][2367] ]]; then
            echo "WARNING: Script $script is world-writable (permissions: $perms)"
            echo "Consider using more restrictive permissions"
          fi
        done
        
        echo "Permission check completed"

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    if: github.event.inputs.run_integration_tests == 'true' || contains(github.event.pull_request.labels.*.name, 'integration-tests')
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      
    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y jq bc docker.io
        sudo systemctl start docker
        sudo usermod -aG docker $USER
        
    - name: Setup Test Environment
      run: |
        echo "Setting up integration test environment..."
        
        # Create minimal test environment structure
        mkdir -p environments/test/{presets/palworld,games/palworld}
        
        # Create test registry files
        cat > environments/test/global-registry.json << 'EOF'
        {
          "supported_games": ["palworld"],
          "environments": ["test"],
          "created": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
          "version": "1.0"
        }
        EOF
        
        cat > environments/test/games/palworld/registry.json << 'EOF'
        {
          "supported_contexts": ["test"],
          "game_config": {
            "name": "Palworld",
            "base_port": 8211,
            "docker_image": "thijsvanloef/palworld-server-docker:latest"
          },
          "created": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
          "version": "1.0"
        }
        EOF
        
        # Create test preset
        cat > environments/test/presets/palworld/test.json << 'EOF'
        {
          "server_name": "Test Server",
          "description": "Test configuration for integration tests",
          "game_settings": {
            "Difficulty": "None",
            "DayTimeSpeedRate": 1.0,
            "NightTimeSpeedRate": 1.0,
            "ExpRate": 1.0
          }
        }
        EOF
        
        echo "Test environment setup completed"
        
    - name: Test Script Validation
      run: |
        echo "Testing script validation functions..."
        
        # Test server-manager validation
        chmod +x scripts/core/server-manager.sh
        
        # This should pass validation
        if ! ./scripts/core/server-manager.sh validate --game palworld --context test --env test --dry-run 2>&1; then
          echo "ERROR: Script validation failed for valid configuration"
          exit 1
        fi
        
        # This should fail validation  
        if ./scripts/core/server-manager.sh validate --game nonexistent --context test --env test --dry-run 2>&1; then
          echo "ERROR: Script validation passed for invalid configuration"
          exit 1
        fi
        
        echo "Script validation tests passed"

  report-status:
    name: Report Validation Status
    runs-on: ubuntu-latest
    needs: [validate-scripts, validate-configurations, validate-systemd-templates, test-script-functionality, security-scan]
    if: always()
    
    steps:
    - name: Report Results
      run: |
        echo "=== PR Validation Results ==="
        echo "Scripts: ${{ needs.validate-scripts.result }}"
        echo "Configurations: ${{ needs.validate-configurations.result }}"
        echo "Systemd Templates: ${{ needs.validate-systemd-templates.result }}"
        echo "Script Functionality: ${{ needs.test-script-functionality.result }}"
        echo "Security Scan: ${{ needs.security-scan.result }}"
        echo "========================="
        
        # Check if any jobs failed
        if [[ "${{ needs.validate-scripts.result }}" == "failure" ]] || \
           [[ "${{ needs.validate-configurations.result }}" == "failure" ]] || \
           [[ "${{ needs.validate-systemd-templates.result }}" == "failure" ]] || \
           [[ "${{ needs.test-script-functionality.result }}" == "failure" ]] || \
           [[ "${{ needs.security-scan.result }}" == "failure" ]]; then
          echo "❌ Some validation checks failed"
          exit 1
        else
          echo "✅ All validation checks passed"
        fi